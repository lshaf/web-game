<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Dusk Arcade">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7b5be6"/>
      <stop offset="45%" stop-color="#ff6fa5"/>
      <stop offset="76%" stop-color="#ffa45c"/>
      <stop offset="100%" stop-color="#ffd23f"/>
    </linearGradient>
    <!-- Chunky ink outline around whatever it's applied to. -->
    <filter id="outline" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="4" result="d"/>
      <feFlood flood-color="#2c1338"/>
      <feComposite in2="d" operator="in" result="o"/>
      <feMerge>
        <feMergeNode in="o"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- cartoon sky -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- grinning sun -->
  <g stroke="#2c1338" stroke-width="5" stroke-linejoin="round">
    <g fill="#ffd23f">
      <polygon points="246,98 266,98 256,60" transform="rotate(0 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(30 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(60 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(90 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(120 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(150 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(180 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(210 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(240 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(270 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(300 256 210)"/>
      <polygon points="246,98 266,98 256,60" transform="rotate(330 256 210)"/>
    </g>
    <circle cx="256" cy="210" r="112" fill="#ffd23f" stroke-width="8"/>
  </g>
  <!-- face -->
  <circle cx="238" cy="200" r="9" fill="#2c1338"/>
  <circle cx="274" cy="200" r="9" fill="#2c1338"/>
  <circle cx="222" cy="236" r="10" fill="#ff4d79" opacity="0.5"/>
  <circle cx="290" cy="236" r="10" fill="#ff4d79" opacity="0.5"/>
  <path d="M228 232 Q256 266 284 232" fill="none" stroke="#2c1338" stroke-width="8" stroke-linecap="round"/>

  <!-- ground -->
  <rect x="0" y="404" width="512" height="108" fill="#23c9ad"/>
  <rect x="0" y="400" width="512" height="6" fill="#2c1338"/>

  <!-- dino, ink-outlined, standing in front of the sun -->
  <g filter="url(#outline)" transform="translate(200.8,278) scale(2.3)">
    <g fill="#43c96b">
      <polygon points="8,21 8,31 0,26"/>
      <rect x="6" y="20" width="30" height="17" rx="1"/>
      <rect x="16" y="10" width="22" height="14" rx="1"/>
      <rect x="28" y="0" width="20" height="15" rx="1.5"/>
      <rect x="30" y="24" width="8" height="4" rx="1"/>
      <rect x="14" y="36" width="6" height="16" rx="1"/>
      <rect x="26" y="36" width="6" height="16" rx="1"/>
    </g>
    <circle cx="41" cy="7" r="2.4" fill="#fff3df"/>
  </g>
</svg>
