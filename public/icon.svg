<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Dusk Arcade">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171228"/>
      <stop offset="52%" stop-color="#3b2350"/>
      <stop offset="74%" stop-color="#6b3a5a"/>
      <stop offset="100%" stop-color="#ff8a4c"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="60%" stop-color="#ff9d54"/>
      <stop offset="80%" stop-color="#ff8a4c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- dusk sky -->
  <rect width="512" height="512" fill="url(#sky)"/>
  <!-- the sun setting behind the horizon -->
  <circle cx="256" cy="356" r="150" fill="url(#sun)"/>
  <!-- ground band, dino sets over the sun -->
  <rect x="0" y="356" width="512" height="156" fill="#120e1f" opacity="0.92"/>
  <rect x="0" y="354" width="512" height="3" fill="#ffd27a"/>
  <!-- blocky dino silhouette, standing on the horizon -->
  <g transform="translate(174.4,179.2) scale(3.4)" fill="#120e1f">
    <polygon points="8,21 8,31 0,26"/>
    <rect x="6" y="20" width="30" height="17" rx="1"/>
    <rect x="16" y="10" width="22" height="14" rx="1"/>
    <rect x="28" y="0" width="20" height="15" rx="1.5"/>
    <rect x="30" y="24" width="8" height="4" rx="1"/>
    <rect x="14" y="36" width="6" height="16" rx="1"/>
    <rect x="26" y="36" width="6" height="16" rx="1"/>
    <circle cx="41" cy="7" r="2" fill="#ffd27a"/>
  </g>
</svg>
